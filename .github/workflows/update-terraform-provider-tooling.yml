name: Update Terraform Provider Tooling

on:
  workflow_call:
    secrets:
      GH_TOKEN:
        description: Token used to check out, push branches, and open pull requests.
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  terraform:
    name: terraform
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Resolve Latest Version
        id: latest
        run: |
          version="$(
            curl -sf https://checkpoint-api.hashicorp.com/v1/check/terraform |
              jq -r '.current_version // empty'
          )"
          [ -n "${version}" ] || { echo 'failed to resolve terraform version' >&2; exit 1; }
          echo "version=${version}" >>"${GITHUB_OUTPUT}"

      - name: Bump Lint Workflow
        id: bump-lint
        uses: craigsloggett/bump-version@85e673033cf965281d41ec89c94189a335fa7633 # v1.1.1
        with:
          file: .github/workflows/lint.yml
          key: >-
            .jobs.terraform-fmt.steps[] |
            select(.uses | test("hashicorp/setup-terraform")) |
            .with.terraform_version
          version: ${{ steps.latest.outputs.version }}

      - name: Create GitHub Pull Request
        if: steps.bump-lint.outputs.changed == 'true'
        id: create-github-pull-request
        uses: craigsloggett/create-github-pull-request@29f3cbd0faff8c1bc2bfebc5cf1598fb8b6f417e # v1.1.0
        with:
          title: 'chore(ci): Bump terraform to ${{ steps.latest.outputs.version }}'
          body: >-
            Bump the pinned `terraform` version in `lint.yml` to
            `${{ steps.latest.outputs.version }}`
          branch: update/bump-terraform-${{ steps.latest.outputs.version }}
          token: ${{ secrets.GH_TOKEN }}

      - name: Publish Available Updates in Step Summary
        if: steps.bump-lint.outputs.changed == 'true'
        run: |
          # shellcheck disable=SC2016 # Backticks here are literal Markdown code-spans.
          {
            printf -- '### Updates Available\n\n'
            printf -- '- `terraform` can be updated in `%s` to `v%s`\n\n' \
              '.github/workflows/lint.yml' \
              "${{ steps.latest.outputs.version }}"
          } >>"${GITHUB_STEP_SUMMARY}"

      - name: Publish Pull Request Summary
        if: steps.create-github-pull-request.conclusion == 'success'
        # Pinned to the unreleased action HEAD for testing; repin to a release tag once cut.
        uses: craigsloggett/publish-pull-request-summary@6e5b8903c067fcea5c19a9c11f7d31426ad1f663 # unreleased
        with:
          url: ${{ steps.create-github-pull-request.outputs.url }}

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Resolve Latest Version
        id: latest
        run: |
          version="$(
            curl -sf https://proxy.golang.org/golang.org/x/vuln/@latest |
              jq -r '.Version // empty'
          )"
          [ -n "${version}" ] || { echo 'failed to resolve govulncheck version' >&2; exit 1; }
          echo "version=${version}" >>"${GITHUB_OUTPUT}"

      - name: Bump Lint Workflow
        id: bump-lint
        uses: craigsloggett/bump-version@85e673033cf965281d41ec89c94189a335fa7633 # v1.1.1
        with:
          file: .github/workflows/lint.yml
          key: >-
            .jobs.govulncheck.steps[] |
            select(.env.GOVULNCHECK_VERSION) |
            .env.GOVULNCHECK_VERSION
          version: ${{ steps.latest.outputs.version }}

      - name: Bump Makefile
        id: bump-makefile
        uses: craigsloggett/bump-version@85e673033cf965281d41ec89c94189a335fa7633 # v1.1.1
        with:
          file: Makefile
          key: GOVULNCHECK_VERSION
          version: ${{ steps.latest.outputs.version }}

      - name: Create GitHub Pull Request
        if: >-
          steps.bump-lint.outputs.changed == 'true' ||
          steps.bump-makefile.outputs.changed == 'true'
        id: create-github-pull-request
        uses: craigsloggett/create-github-pull-request@29f3cbd0faff8c1bc2bfebc5cf1598fb8b6f417e # v1.1.0
        with:
          title: 'chore(build): Bump govulncheck to ${{ steps.latest.outputs.version }}'
          body: >-
            Bump the pinned `govulncheck` version in `lint.yml` and `Makefile` to
            `${{ steps.latest.outputs.version }}`
          branch: update/bump-govulncheck-${{ steps.latest.outputs.version }}
          token: ${{ secrets.GH_TOKEN }}

      - name: Publish Available Updates in Step Summary
        if: >-
          steps.bump-lint.outputs.changed == 'true' ||
          steps.bump-makefile.outputs.changed == 'true'
        run: |
          # shellcheck disable=SC2016 # Backticks here are literal Markdown code-spans.
          {
            printf -- '### Updates Available\n\n'
            printf -- '- `govulncheck` can be updated in `%s` and `%s` to `%s`\n\n' \
              '.github/workflows/lint.yml' \
              'Makefile' \
              "${{ steps.latest.outputs.version }}"
          } >>"${GITHUB_STEP_SUMMARY}"

      - name: Publish Pull Request Summary
        if: steps.create-github-pull-request.conclusion == 'success'
        # Pinned to the unreleased action HEAD for testing; repin to a release tag once cut.
        uses: craigsloggett/publish-pull-request-summary@6e5b8903c067fcea5c19a9c11f7d31426ad1f663 # unreleased
        with:
          url: ${{ steps.create-github-pull-request.outputs.url }}

  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Resolve Latest Version
        id: latest
        run: |
          version="$(
            curl -sf https://proxy.golang.org/github.com/golangci/golangci-lint/v2/@latest |
              jq -r '.Version // empty'
          )"
          [ -n "${version}" ] || { echo 'failed to resolve golangci-lint version' >&2; exit 1; }
          echo "version=${version}" >>"${GITHUB_OUTPUT}"

      - name: Bump Lint Workflow
        id: bump-lint
        uses: craigsloggett/bump-version@85e673033cf965281d41ec89c94189a335fa7633 # v1.1.1
        with:
          file: .github/workflows/lint.yml
          key: >-
            .jobs["golangci-lint"].steps[] |
            select(.uses | test("golangci/golangci-lint-action")) |
            .with.version
          version: ${{ steps.latest.outputs.version }}

      - name: Bump Makefile
        id: bump-makefile
        uses: craigsloggett/bump-version@85e673033cf965281d41ec89c94189a335fa7633 # v1.1.1
        with:
          file: Makefile
          key: GOLANGCI_LINT_VERSION
          version: ${{ steps.latest.outputs.version }}

      - name: Create GitHub Pull Request
        if: >-
          steps.bump-lint.outputs.changed == 'true' ||
          steps.bump-makefile.outputs.changed == 'true'
        id: create-github-pull-request
        uses: craigsloggett/create-github-pull-request@29f3cbd0faff8c1bc2bfebc5cf1598fb8b6f417e # v1.1.0
        with:
          title: 'chore(build): Bump golangci-lint to ${{ steps.latest.outputs.version }}'
          body: >-
            Bump the pinned `golangci-lint` version in `lint.yml` and `Makefile` to
            `${{ steps.latest.outputs.version }}`
          branch: update/bump-golangci-lint-${{ steps.latest.outputs.version }}
          token: ${{ secrets.GH_TOKEN }}

      - name: Publish Available Updates in Step Summary
        if: >-
          steps.bump-lint.outputs.changed == 'true' ||
          steps.bump-makefile.outputs.changed == 'true'
        run: |
          # shellcheck disable=SC2016 # Backticks here are literal Markdown code-spans.
          {
            printf -- '### Updates Available\n\n'
            printf -- '- `golangci-lint` can be updated in `%s` and `%s` to `%s`\n\n' \
              '.github/workflows/lint.yml' \
              'Makefile' \
              "${{ steps.latest.outputs.version }}"
          } >>"${GITHUB_STEP_SUMMARY}"

      - name: Publish Pull Request Summary
        if: steps.create-github-pull-request.conclusion == 'success'
        # Pinned to the unreleased action HEAD for testing; repin to a release tag once cut.
        uses: craigsloggett/publish-pull-request-summary@6e5b8903c067fcea5c19a9c11f7d31426ad1f663 # unreleased
        with:
          url: ${{ steps.create-github-pull-request.outputs.url }}

  tfplugindocs:
    name: tfplugindocs
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Resolve Latest Version
        id: latest
        run: |
          version="$(
            curl -sf https://proxy.golang.org/github.com/hashicorp/terraform-plugin-docs/@latest |
              jq -r '.Version // empty'
          )"
          [ -n "${version}" ] || { echo 'failed to resolve tfplugindocs version' >&2; exit 1; }
          echo "version=${version}" >>"${GITHUB_OUTPUT}"

      - name: Bump Lint Workflow
        id: bump-lint
        uses: craigsloggett/bump-version@85e673033cf965281d41ec89c94189a335fa7633 # v1.1.1
        with:
          file: .github/workflows/lint.yml
          key: >-
            .jobs.tfplugindocs.steps[] |
            select(.run | test("tfplugindocs")) |
            .env.TFPLUGINDOCS_VERSION
          version: ${{ steps.latest.outputs.version }}

      - name: Bump Makefile
        id: bump-makefile
        uses: craigsloggett/bump-version@85e673033cf965281d41ec89c94189a335fa7633 # v1.1.1
        with:
          file: Makefile
          key: TFPLUGINDOCS_VERSION
          version: ${{ steps.latest.outputs.version }}

      - name: Create GitHub Pull Request
        if: >-
          steps.bump-lint.outputs.changed == 'true' ||
          steps.bump-makefile.outputs.changed == 'true'
        id: create-github-pull-request
        uses: craigsloggett/create-github-pull-request@29f3cbd0faff8c1bc2bfebc5cf1598fb8b6f417e # v1.1.0
        with:
          title: 'chore(build): Bump tfplugindocs to ${{ steps.latest.outputs.version }}'
          body: >-
            Bump the pinned `tfplugindocs` version in `lint.yml` and `Makefile` to
            `${{ steps.latest.outputs.version }}`
          branch: update/bump-tfplugindocs-${{ steps.latest.outputs.version }}
          token: ${{ secrets.GH_TOKEN }}

      - name: Publish Available Updates in Step Summary
        if: >-
          steps.bump-lint.outputs.changed == 'true' ||
          steps.bump-makefile.outputs.changed == 'true'
        run: |
          # shellcheck disable=SC2016 # Backticks here are literal Markdown code-spans.
          {
            printf -- '### Updates Available\n\n'
            printf -- '- `tfplugindocs` can be updated in `%s` and `%s` to `%s`\n\n' \
              '.github/workflows/lint.yml' \
              'Makefile' \
              "${{ steps.latest.outputs.version }}"
          } >>"${GITHUB_STEP_SUMMARY}"

      - name: Publish Pull Request Summary
        if: steps.create-github-pull-request.conclusion == 'success'
        # Pinned to the unreleased action HEAD for testing; repin to a release tag once cut.
        uses: craigsloggett/publish-pull-request-summary@6e5b8903c067fcea5c19a9c11f7d31426ad1f663 # unreleased
        with:
          url: ${{ steps.create-github-pull-request.outputs.url }}
